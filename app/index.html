<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVAI Flow — Workspace</title>
    <link rel="stylesheet" href="../css/style.css" />

    <script src="api.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body class="app-body">

          <div class="nav-sec">业务</div>
          <div class="nav-group" data-group="ops">
            <button class="nav-grp-h" type="button"><span class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> 运营 <span class="chev">›</span></button>
            <div class="nav-sub">
              <a href="#/clients" data-nav="clients">客户</a>
              <a href="#/tasks" data-nav="tasks">任务</a>
              <a href="#/projects" data-nav="projects">项目</a>
              <a href="#/messages" data-nav="messages">消息</a>
            </div>
          </div>
          <div class="nav-group" data-group="biz">
            <button class="nav-grp-h" type="button"><span class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/></svg></span> 财务与文档 <span class="chev">›</span></button>
            <div class="nav-sub">
              <a href="#/contracts" data-nav="contracts">合同</a>
              <a href="#/invoices" data-nav="invoices">发票</a>
              <a href="#/report" data-nav="report">报告</a>
              <a href="#/files" data-nav="files">文件</a>
            </div>
          </div>
          <a class="nav-item" href="#/reports" data-nav="reports"><span class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7" rx="0.6"/><rect x="12" y="7" width="3" height="11" rx="0.6"/><rect x="17" y="13" width="3" height="5" rx="0.6"/></svg></span> 报表</a>

              <a href="#/automations" data-nav="automations">自动化</a>
              <a href="#/integrations" data-nav="integrations">集成</a>
              <a href="#/announcements" data-nav="announcements">公告</a>
              <a href="#/team" data-nav="team">团队</a>

        <div class="app-side-foot">
          <a href="../index.html" class="app-side-link">← 返回官网</a>
        </div>
      </aside>

      <div class="app-main">
        <header class="app-top">
          <button class="app-burger" id="appBurger" aria-label="Menu">☰</button>
          <div class="app-top-title" id="appTitle">仪表盘</div>
          <div class="app-search">
            <input id="appSearch" type="search" placeholder="搜索客户 / 任务 / 合同…" autocomplete="off" />
            <div class="app-search-res" id="searchRes" hidden></div>
          </div>
          <div class="app-top-right">
            <button class="app-bookmark" id="appBookmark" title="收藏此页">☆</button>
            <button class="app-bell" id="appBell" title="通知"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="app-bell-dot" id="bellDot" hidden></span></button>
            <div class="app-account">
              <button class="app-account-btn" id="appAccountBtn"><span class="av" id="appAv">N</span><span id="appUser"></span><span class="cv">▾</span></button>
              <div class="app-menu" id="appMenu" hidden></div>
            </div>
          </div>
        </header>
        <main class="app-view" id="view"></main>
      </div>

      <div class="app-overlay" id="appOverlay"></div>
    </div>

    <!-- toast + modal host -->
    <div class="app-toast" id="toast"></div>
    <div class="app-modal-host" id="modalHost"></div>
