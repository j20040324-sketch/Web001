<!DOCTYPE html>
<html lang="zh-CN" data-year="2026"
  data-title-zh="注册 — NOVAI Flow"
  data-title-en="Sign up — NOVAI Flow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="免费创建 NOVAI Flow 账号。" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
    <script src="js/auth.js" defer></script>
    <title>注册 — NOVAI Flow</title>
  </head>
  <body>
    <div class="auth">
      <!-- Brand panel -->
      <aside class="auth-visual bg-home">
        <a class="brand" href="index.html">NOVAI</a>
        <div class="pitch">
          <h2 data-en="Start in<br />minutes">几分钟<br />即可开始</h2>
          <p data-en="Create a free account and automate your first workflow today — no credit card, no code.">
            免费创建账号，今天就自动化你的第一个工作流——无需信用卡，无需写代码。
          </p>
        </div>
        <p class="quote" data-en="Free forever for individuals · Upgrade anytime">个人永久免费 · 随时升级</p>
      </aside>

      <!-- Form -->
      <main class="auth-main">
        <div class="auth-card">
          <div class="auth-top">
            <a class="home-link" href="index.html" data-en="← Back to home">← 返回首页</a>
            <a class="link-accent" href="login.html" data-en="Sign in">登录</a>
          </div>

          <h1 data-en="Create account">创建账号</h1>
          <p class="auth-sub" data-en="Start free in seconds. No credit card required.">几秒钟免费开始，无需信用卡。</p>

          <div class="auth-msg" id="authMsg"></div>

          <form id="signupForm" novalidate>
            <div class="auth-field">
              <label for="name" data-en="Full name">姓名</label>
              <input id="name" name="name" type="text" autocomplete="name"
                placeholder="你的名字" data-en-placeholder="Your name" />
              <p class="err" data-en="Please enter your name.">请输入你的姓名。</p>
            </div>

            <div class="auth-field">
              <label for="email" data-en="Work email">工作邮箱</label>
              <input id="email" name="email" type="email" autocomplete="email"
                placeholder="you@company.com" data-en-placeholder="you@company.com" />
              <p class="err" data-en="Please enter a valid email.">请输入有效的邮箱地址。</p>
            </div>

            <div class="auth-field">
              <label for="password" data-en="Password">密码</label>
              <div class="auth-pass">
                <input id="password" name="password" type="password" autocomplete="new-password"
                  placeholder="至少 8 位" data-en-placeholder="At least 8 characters" />
                <button type="button" class="toggle" data-toggle="password" data-en="Show">显示</button>
              </div>
              <div class="pw-meter"><span id="pwBar"></span></div>
              <p class="err" data-en="Use at least 8 characters.">密码至少 8 位。</p>
            </div>

            <div class="auth-field">
              <label for="confirm" data-en="Confirm password">确认密码</label>
              <div class="auth-pass">
                <input id="confirm" name="confirm" type="password" autocomplete="new-password"
                  placeholder="再次输入密码" data-en-placeholder="Re-enter password" />
                <button type="button" class="toggle" data-toggle="confirm" data-en="Show">显示</button>
              </div>
              <p class="err" data-en="Passwords do not match.">两次输入的密码不一致。</p>
            </div>

            <div class="auth-field" id="agreeField">
              <label class="checkbox">
                <input type="checkbox" id="agree" />
                <span>
                  <span data-en="I agree to the">我已阅读并同意</span>
                  <a href="terms.html" data-en="Terms">服务条款</a>
                  <span data-en="and">与</span>
                  <a href="privacy.html" data-en="Privacy Policy">隐私政策</a>
                </span>
              </label>
              <p class="err" data-en="Please accept the terms to continue.">请先同意条款再继续。</p>
            </div>

            <button type="submit" class="btn btn-accent btn-full" data-en="Create account">创建账号</button>
          </form>

          <div class="auth-divider" data-en="or">或</div>

          <div class="auth-social">
            <button type="button" class="social-btn" data-social="Google">Google</button>
            <button type="button" class="social-btn" data-social="GitHub">GitHub</button>
          </div>

          <p class="auth-alt">
            <span data-en="Already have an account?">已有账号？</span>
            <a class="link-accent" href="login.html" data-en="Sign in">登录</a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
