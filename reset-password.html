<!DOCTYPE html>
<html lang="zh-CN" data-year="2026"
  data-title-zh="重置密码 — NOVAI Flow"
  data-title-en="Reset password — NOVAI Flow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="重置 NOVAI Flow 密码。" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" defer></script>
    <script src="js/site.js" defer></script>
    <script src="js/api.js" defer></script>
    <title>重置密码 — NOVAI Flow</title>
  </head>
  <body>
    <div class="auth">
      <aside class="auth-visual bg-home">
        <a class="brand" href="index.html">NOVAI</a>
        <div class="pitch">
          <h2 data-en="Set a new<br />password">设置<br />新密码</h2>
          <p data-en="Choose a strong password to get back into your workspace.">
            设置一个安全的新密码，重新进入你的工作区。
          </p>
        </div>
      </aside>

      <main class="auth-main">
        <div class="auth-card">
          <div class="auth-top">
            <a class="home-link" href="login.html" data-en="← Back to sign in">← 返回登录</a>
          </div>

          <h1 data-en="Reset password">重置密码</h1>
          <p class="auth-sub" data-en="Enter a new password for your account.">为你的账号设置一个新密码。</p>

          <div class="auth-msg" id="authMsg"></div>

          <form id="resetForm" novalidate>
            <div class="auth-field">
              <label for="password" data-en="New password">新密码</label>
              <div class="auth-pass">
                <input id="password" name="password" type="password" autocomplete="new-password"
                  placeholder="至少 8 位" data-en-placeholder="At least 8 characters" />
                <button type="button" class="toggle" data-toggle="password" data-en="Show">显示</button>
              </div>
              <p class="err" data-en="Password must be at least 8 characters.">密码至少 8 位。</p>
            </div>

            <div class="auth-field">
              <label for="confirm" data-en="Confirm password">确认密码</label>
              <input id="confirm" name="confirm" type="password" autocomplete="new-password"
                placeholder="再次输入" data-en-placeholder="Re-enter password" />
              <p class="err" data-en="Passwords do not match.">两次输入不一致。</p>
            </div>

            <button type="submit" class="btn btn-accent btn-full" data-en="Reset password">重置密码</button>
          </form>
        </div>
      </main>
    </div>

    <script>
      (function () {
        var lang = function () { return document.documentElement.lang === 'en' ? 'en' : 'zh'; };
        function q(id) { return document.getElementById(id); }
        var token = new URLSearchParams(location.search).get('token') || '';
        var msg = q('authMsg');
        function show(t) { msg.textContent = t; msg.classList.add('show'); }
        if (!token) show(lang() === 'en' ? 'Invalid or missing reset link.' : '重置链接无效或缺少参数。');

        // password show / hide
        document.querySelectorAll('.toggle[data-toggle]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var input = q(btn.getAttribute('data-toggle'));
            if (!input) return;
            var showing = input.type === 'password';
            input.type = showing ? 'text' : 'password';
            btn.textContent = showing ? (lang() === 'en' ? 'Hide' : '隐藏') : (lang() === 'en' ? 'Show' : '显示');
          });
        });

        q('resetForm').addEventListener('submit', function (e) {
          e.preventDefault();
          var p = q('password').value, c = q('confirm').value;
          if (p.length < 8) { show(lang() === 'en' ? 'Password must be at least 8 characters.' : '密码至少 8 位。'); return; }
          if (p !== c) { show(lang() === 'en' ? 'Passwords do not match.' : '两次输入不一致。'); return; }
          if (!token) { show(lang() === 'en' ? 'Invalid reset link.' : '重置链接无效。'); return; }
          if (!window.NovaiApi) { show(lang() === 'en' ? 'Service not ready, try again.' : '服务未就绪，请稍后重试。'); return; }
          var btn = e.target.querySelector('button[type=submit]');
          if (btn) btn.disabled = true;
          window.NovaiApi.resetPassword(token, p).then(function () {
            show(lang() === 'en' ? 'Password reset. Redirecting to sign in…' : '密码已重置，正在跳转到登录…');
            setTimeout(function () { location.href = 'login.html'; }, 1500);
          }).catch(function (err) { if (btn) btn.disabled = false; show(err.message); });
        });
      })();
    </script>
  </body>
</html>
